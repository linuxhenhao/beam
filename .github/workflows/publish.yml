# Stage 3: crates.io publish (gated)
#
# Triggered by beam-cli-v* tag pushes or manual workflow_dispatch.
# release-plz defaults to <package>-v<version> tags in multi-crate
# workspaces. Use beam-cli as the workspace release sentinel so publish
# runs once per release, not once per crate tag.
#
# A validate-tag job checks that the tag is a stable beam-cli semver
# (beam-cli-vX.Y.Z). Prerelease tags (beam-cli-vX.Y.Z-beta.1, etc.) are
# skipped without triggering the production environment approval.
#
# Publishing is gated behind the "production" GitHub Environment,
# which can be configured with required reviewers in repo settings.
#
# Publish order (topological): beam-core -> beam-daemon -> beam-worker -> beam-cli
# Each crate is dry-run first (with retry), then published (with retry).
# Already-published crate versions are skipped so a failed publish can be
# safely re-run from the same tag.
# A 30 s sleep between crates accommodates crates.io index update delay.
#
# Required secrets / settings (see AGENTS.md):
#   Secret:    CRATES_IO_TOKEN   (crates.io API token, scope: publish-update)
#   Environment: production      (with required reviewers, if desired)

name: Publish to crates.io

on:
  push:
    tags:
      # Match beam-cli release-plz tags. Validation (stable vs prerelease)
      # happens in the validate-tag job so prereleases don't trigger a
      # production approval.
      - 'beam-cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish from (e.g. beam-cli-v0.3.0 or refs/tags/beam-cli-v0.3.0)'
        required: true
        type: string

concurrency:
  group: publish-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Pre-flight: determine the tag and check it is stable semver.
  # This job uses NO environment so prerelease tags never trigger
  # a production-environment approval.
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.check.outputs.stable }}
      ref: ${{ steps.check.outputs.ref }}
    steps:
      - name: Validate tag is stable semver
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_INPUT="${{ inputs.tag }}"
            # Strip optional refs/tags/ prefix so users can paste
            # either "beam-cli-v0.3.0" or "refs/tags/beam-cli-v0.3.0".
            TAG="${TAG_INPUT#refs/tags/}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "Resolved tag: ${TAG}"

          if [[ "${TAG}" =~ ^beam-cli-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable semver tag - publish will proceed"
            echo "stable=true" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "Not a stable semver tag (prerelease or invalid). Skipping crates.io publish."
            echo "stable=false" >> "$GITHUB_OUTPUT"
          fi

  # Publish crates (only for stable semver tags).
  publish:
    needs: validate-tag
    if: needs.validate-tag.outputs.stable == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.ref }}
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run tests before publishing
        run: cargo test --workspace --no-fail-fast

      - name: Publish crates in topological order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail

          crate_version() {
            local crate="$1"
            cargo metadata --no-deps --format-version 1 \
              | python3 -c 'import json, sys; crate = sys.argv[1]; metadata = json.load(sys.stdin); versions = [p["version"] for p in metadata["packages"] if p["name"] == crate]; assert versions, f"crate not found in workspace metadata: {crate}"; print(versions[0])' "${crate}"
          }

          crate_version_exists() {
            local crate="$1"
            local version="$2"
            local status

            status="$(curl -sS -H 'User-Agent: linuxhenhao/beam publish workflow' -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/${crate}/${version}")"

            case "${status}" in
              200)
                return 0
                ;;
              404)
                return 1
                ;;
              *)
                echo "::error::Failed to check crates.io for ${crate}@${version}; HTTP ${status}"
                return 2
                ;;
            esac
          }

          publish_crate() {
            local crate="$1"
            local version
            local max_retries=6

            version="$(crate_version "${crate}")"

            if crate_version_exists "${crate}" "${version}"; then
              echo "${crate}@${version} is already published; skipping."
              return 0
            fi

            # Dry-run with retry (handles crates.io index delay).
            echo "::group::Dry-run: cargo publish --dry-run -p ${crate}"
            local ok=false
            for i in $(seq 1 ${max_retries}); do
              if cargo publish --dry-run -p "${crate}"; then
                echo "✓ ${crate} dry-run successful (attempt ${i})"
                ok=true
                break
              fi
              if [ "${i}" -lt "${max_retries}" ]; then
                echo "Dry-run attempt ${i}/${max_retries} failed — retrying in 30 s"
                sleep 30
              fi
            done
            echo "::endgroup::"
            if [ "${ok}" != "true" ]; then
              echo "::error::Dry-run failed for ${crate} after ${max_retries} attempts"
              return 1
            fi

            # Publish with retry (handles crates.io index delay).
            echo "::group::Publishing ${crate}"
            for i in $(seq 1 ${max_retries}); do
              if cargo publish -p "${crate}"; then
                echo "${crate} published successfully (attempt ${i})"
                echo "::endgroup::"
                return 0
              fi
              if crate_version_exists "${crate}" "${version}"; then
                echo "${crate}@${version} is now visible on crates.io; treating publish as successful."
                echo "::endgroup::"
                return 0
              fi
              if [ "${i}" -lt "${max_retries}" ]; then
                echo "Publish attempt ${i}/${max_retries} failed — retrying in 30 s (crates.io index delay)"
                sleep 30
              fi
            done
            echo "::endgroup::"
            echo "::error::Failed to publish ${crate} after ${max_retries} attempts"
            return 1
          }

          # Topological order: leaf -> dependent
          publish_crate beam-core
          sleep 30   # let crates.io index pick up beam-core

          publish_crate beam-daemon
          sleep 30

          publish_crate beam-worker
          sleep 30

          publish_crate beam-cli
