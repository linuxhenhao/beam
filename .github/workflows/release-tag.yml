# Stage 2: Git Tag + GitHub Release (NO crates.io publish)
#
# On every push to main, release-plz checks whether there are unpublished
# version bumps (i.e. the Release PR was just merged).  If so, it creates
# the git tag and a GitHub Release with the changelog.
#
# On ordinary main pushes (no version bumps), this workflow is a no-op.
#
# It does NOT publish to crates.io — that is Stage 3 (publish.yml).
#
# The tag push additionally triggers:
#   • .github/workflows/release.yml   → build & upload binary
#   • .github/workflows/publish.yml   → crates.io publish (stable tags only)

name: Release Tag

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # needed to push tags + create GitHub Releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
