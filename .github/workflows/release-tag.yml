# Stage 2: Git Tag + GitHub Release (NO crates.io publish)
#
# On every push to main, release-plz checks whether there are unpublished
# version bumps (i.e. the Release PR was just merged).  If so, it creates
# the git tag and a GitHub Release with the changelog.
#
# On ordinary main pushes (no version bumps), this workflow is a no-op.
#
# It does NOT publish to crates.io — that is Stage 3 (publish.yml).
#
# The tag push additionally triggers:
#   • .github/workflows/release.yml   → build & upload binary
#   • .github/workflows/publish.yml   → crates.io publish (stable tags only)
#
# When this workflow finishes successfully on main, it triggers Stage 1
# (.github/workflows/release-pr.yml) to serially create/update the
# Release PR.  This prevents the race condition where both workflows ran
# in parallel on push main, and release-pr opened a duplicate Release PR
# before the tag was created.
#
# Token note:
#   Tags created with the default GITHUB_TOKEN do NOT recursively trigger
#   downstream tag-based workflows (release.yml / publish.yml). Configure
#   RELEASE_PLZ_TOKEN (fine-grained PAT with contents: write and, if needed,
#   workflow: write permissions). This workflow fails fast when the PAT is
#   missing so releases do not stop halfway through the automation.

name: Release Tag

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # needed to push tags + create GitHub Releases

concurrency:
  group: release-tag
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify RELEASE_PLZ_TOKEN is configured
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_PLZ_TOKEN}" ]; then
            echo "::error::RELEASE_PLZ_TOKEN is required so release-plz tags trigger release.yml and publish.yml."
            exit 1
          fi

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
          config: release-plz.toml
        env:
          # Use a PAT so tags created by release-plz trigger downstream
          # tag-based workflows (release.yml / publish.yml).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
