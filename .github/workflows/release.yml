# Stage 2 companion: build & upload binary to GitHub Release
#
# Triggered by beam-cli-v* tag pushes (stable or prerelease).
# The tag is created by release-plz when the Release PR is merged
# (see .github/workflows/release-tag.yml).
#
# This workflow:
#   1. Runs the full test suite
#   2. Builds the `beam-cli` binary in release mode
#   3. Uploads `target/release/beam` as an asset to the GitHub Release
#      that release-plz already created (or creates one if missing).
#
# NOTE: The `body` is intentionally left empty so that release-plz's
#       generated changelog on the GitHub Release is preserved.

name: Release Binary

on:
  push:
    tags:
      # release-plz defaults to <package>-v<version> tags in multi-crate
      # workspaces. Use beam-cli as the workspace release sentinel so the
      # binary workflow runs once per release, not once per crate tag.
      - 'beam-cli-v*'

concurrency:
  group: release-binary-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test --workspace --no-fail-fast

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release binary
        run: cargo build -p beam-cli --release

      - name: Classify tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" =~ ^beam-cli-v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/beam
          # Don't set `body` — preserves the changelog release-plz wrote.
          prerelease: ${{ steps.tag.outputs.prerelease }}
